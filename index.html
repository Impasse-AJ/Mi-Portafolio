    <!-- Anti-flash: apply dark class before paint if needed -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (t === null && d)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
